<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kutubxona Boshqaruv Tizimi – A'zolar, Kitoblar va Statistikani real vaqtda boshqaring.">
  <title>📚 Kutubxona Boshqaruv Tizimi</title>

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- App CSS -->
  <link rel="stylesheet" href="/static/css/style.css?v=2">

  <!-- Libraries (CDN) -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>

<body>
<div id="app" class="app-wrapper">

  <!-- ======================================================
       LOGIN SCREEN
       ====================================================== -->
  <div class="login-overlay" v-if="!isLoggedIn">
    <div class="login-card">
      <div class="login-logo">📚</div>
      <h2 class="login-title">Kutubxona Tizimi</h2>
      <p class="login-subtitle">Iltimos, tizimga kiring</p>
      
      <div class="form-group" style="margin-bottom:16px;text-align:left">
        <label class="form-label">Foydalanuvchi nomi</label>
        <input class="form-control" v-model="loginForm.username" placeholder="admin">
      </div>
      <div class="form-group" style="margin-bottom:16px;text-align:left">
        <label class="form-label">Parol</label>
        <input class="form-control" type="password" v-model="loginForm.password" placeholder="••••••••">
      </div>
      <div class="form-group" style="margin-bottom:24px;text-align:left">
        <label class="form-label">Rol</label>
        <select class="form-control" v-model="loginForm.role">
          <option value="admin">Administrator</option>
          <option value="operator">Operator</option>
        </select>
      </div>
      
      <button class="btn btn-primary" style="width:100%" @click="login">Kirish</button>
    </div>
  </div>

  <template v-if="isLoggedIn">
  <!-- ======================================================
       SIDEBAR
       ====================================================== -->
  <nav class="sidebar" :class="{ open: sidebarOpen }" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">📚</div>
      <div class="logo-text">
        <h2>Kutubxona</h2>
        <span>Boshqaruv Tizimi</span>
      </div>
    </div>

    <div class="sidebar-nav">
      <div class="nav-section-label">Asosiy</div>

      <div class="nav-item" :class="{ active: currentPage==='dashboard' }"
           id="nav-dashboard" @click="navigate('dashboard')">
        <span class="nav-icon">📊</span>
        Dashboard
      </div>

      <div class="nav-section-label">Ma'lumotlar</div>

      <div class="nav-item" :class="{ active: currentPage==='members' }"
           id="nav-members" @click="navigate('members')">
        <span class="nav-icon">👤</span>
        A'zolar
      </div>

      <div class="nav-item" :class="{ active: currentPage==='pending_members' }"
           id="nav-pending-members" @click="navigate('pending_members')">
        <span class="nav-icon">⏳</span>
        A'zolik So'rovlari
        <span class="nav-badge" v-if="dashStats.kutilmoqda_members > 0">{{ dashStats.kutilmoqda_members }}</span>
      </div>

      <div class="nav-item" :class="{ active: currentPage==='books' }"
           id="nav-books" @click="navigate('books')">
        <span class="nav-icon">📚</span>
        Kitoblar
      </div>

      <div class="nav-item" :class="{ active: currentPage==='issues' }"
           id="nav-issues" @click="navigate('issues')">
        <span class="nav-icon">📖</span>
        Kitob Berish
      </div>

      <div class="nav-item" :class="{ active: currentPage==='reservations' }"
           id="nav-reservations" @click="navigate('reservations')">
        <span class="nav-icon">🔖</span>
        Band Qilinganlar
      </div>

      <div class="nav-item" :class="{ active: currentPage==='extensions' }"
           id="nav-extensions" @click="navigate('extensions')">
        <span class="nav-icon">⏳</span>
        So'rovlar
      </div>

      <div class="nav-item" :class="{ active: currentPage==='finance' }"
           id="nav-finance" @click="navigate('finance')">
        <span class="nav-icon">💰</span>
        Moliya (Beta)
      </div>

      <div class="nav-section-label">Boshqaruv</div>

      <div class="nav-item" v-if="auth.role === 'admin'" :class="{ active: currentPage==='import' }"
           id="nav-import" @click="navigate('import')">
        <span class="nav-icon">📥</span>
        Excel Import
      </div>

      <div class="nav-item" v-if="auth.role === 'admin'" :class="{ active: currentPage==='audit_log' }"
           id="nav-audit-log" @click="navigate('audit_log')">
        <span class="nav-icon">📝</span>
        Audit Log
      </div>

      <div class="nav-item" v-if="auth.role === 'admin'" :class="{ active: currentPage==='backup' }"
           id="nav-backup" @click="navigate('backup')">
        <span class="nav-icon">💾</span>
        Ma'lumotlar Bazasi
      </div>

      <div class="nav-item" @click="logout" id="nav-logout">
        <span class="nav-icon">🚪</span>
        Chiqish
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar">{{ auth.role === 'admin' ? '🛡️' : '👤' }}</div>
        <div class="user-info">
          <div class="user-name">{{ auth.username }}</div>
          <div class="user-role">{{ auth.role === 'admin' ? 'Administrator' : 'Operator' }}</div>
        </div>
      </div>
    </div>
  </nav>

  <!-- ======================================================
       MAIN CONTENT
       ====================================================== -->
  <div class="main-content">

    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-hamburger" @click="sidebarOpen = !sidebarOpen" id="btn-hamburger">☰</button>
        <h1>
          <span v-if="currentPage==='dashboard'">📊 Dashboard</span>
          <span v-else-if="currentPage==='members'">👤 A'zolar Boshqaruvi</span>
          <span v-else-if="currentPage==='pending_members'">⏳ A'zolik So'rovlari</span>
          <span v-else-if="currentPage==='books'">📚 Kitoblar</span>
          <span v-else-if="currentPage==='issues'">📖 Kitob Berish Jurnali</span>
          <span v-else-if="currentPage==='reservations'">🔖 Band Qilinganlar</span>
          <span v-else-if="currentPage==='extensions'">⏳ So'rovlar</span>
          <span v-else-if="currentPage==='import'">📥 Excel Import</span>
          <span v-else-if="currentPage==='audit_log'">📝 Audit Log</span>
          <span v-else-if="currentPage==='backup'">💾 Ma'lumotlar Bazasi</span>
        </h1>
        <div class="breadcrumb">Kutubxona Boshqaruv Tizimi</div>
      </div>
      <div class="topbar-right">
        
        <!-- Notifications Dropdown -->
        <div style="position:relative; margin-right:12px;">
          <div class="notification-bell" @click="showNotifications = !showNotifications">
            <span style="font-size: 20px;">🔔</span>
            <span class="badge" v-if="notifications.length > 0">{{ notifications.length }}</span>
          </div>
          <div class="notification-dropdown" v-if="showNotifications">
            <div v-if="notifications.length === 0" style="padding:8px; text-align:center; color:var(--text-secondary);">
              Yangi bildirishnomalar yo'q.
            </div>
            <div class="notif-item" v-for="(n, i) in notifications" :key="i">
              <span class="notif-icon" v-if="n.type === 'warning'">⚠️</span>
              <span class="notif-icon" v-else-if="n.type === 'info'">ℹ️</span>
              <span class="notif-icon" v-else>🔔</span>
              <div class="notif-text">{{ n.message }}</div>
            </div>
          </div>
        </div>

        <button class="btn btn-secondary btn-sm" @click="toggleTheme" style="margin-right:8px; padding:6px 10px;" id="btn-theme-toggle">
          <span v-if="theme === 'dark'">☀️ Kunduzgi</span>
          <span v-else>🌙 Tungi</span>
        </button>
        <div class="topbar-date">📅 {{ today }}</div>
        <button v-if="currentPage==='members'" class="btn btn-primary btn-sm" @click="openAddMember" id="btn-add-member">
          ➕ Yangi A'zo
        </button>
        <button v-if="currentPage==='books'" class="btn btn-primary btn-sm" @click="openAddBook" id="btn-add-book">
          ➕ Yangi Kitob
        </button>
        <button v-if="currentPage==='issues'" class="btn btn-success btn-sm" @click="openAddIssue" id="btn-add-issue">
          📖 Kitob Berish
        </button>
      </div>
    </header>

    <!-- Page Body -->
    <main class="page-body">

      <!-- ====================================================
           DASHBOARD PAGE
           ==================================================== -->
      <section v-if="currentPage==='dashboard'">
        <div v-if="dashLoading" class="loading-overlay"><div class="spinner"></div></div>
        <template v-else-if="dashStats">

          <!-- Filter Bar -->
          <div class="filters-bar" style="margin-bottom: 20px;">
            <div style="display:flex; align-items:center; gap: 10px; flex-wrap:wrap;">
              <label style="font-size:13px; color:var(--text-muted)">Dan:</label>
              <input type="date" class="form-control" v-model="dashDateFrom" @change="loadDashboard" style="max-width:160px">
              <label style="font-size:13px; color:var(--text-muted)">Gacha:</label>
              <input type="date" class="form-control" v-model="dashDateTo" @change="loadDashboard" style="max-width:160px">
              <select class="form-control" v-model="dashPeriod" @change="setDashPeriod" style="width: 150px;">
                <option value="">Erkin muddat</option>
                <option value="day">Bugun</option>
                <option value="month">Shu oy</option>
                <option value="quarter">Shu chorak</option>
                <option value="half_year">So'nggi 6 oy</option>
                <option value="all">Barchasi</option>
              </select>
              <button class="btn btn-secondary btn-sm" @click="dashDateFrom=''; dashDateTo=''; dashPeriod=''; loadDashboard()">✕ Tozalash</button>
            </div>
          </div>

          <!-- Date filter banner -->
          <div v-if="dashDateFrom || dashDateTo" style="background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.3); border-radius: 8px; padding: 8px 16px; margin-bottom: 16px; font-size: 13px; color: #6366f1;">
            📅 Filtrlangan davr: <b>{{ dashDateFrom || '...' }}</b> — <b>{{ dashDateTo || '...' }}</b>
            &nbsp;| Shu davrda qo'shilgan a'zolar: <b>{{ dashStats.filtered_members_count ?? 0 }}</b> ta
            &nbsp;| Shu davrda qo'shilgan kitoblar: <b>{{ dashStats.added_books_count ?? 0 }}</b> ta
          </div>

          <!-- KPI Stat Cards Row 1: Members -->
          <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 16px;">
            <div class="stat-card c1">
              <div class="stat-icon">👥</div>
              <div class="stat-value">{{ dashStats.total_members }}</div>
              <div class="stat-label">Jami A'zolar</div>
              <div class="stat-sub">Ro'yxatdagi jami</div>
            </div>
            <div class="stat-card c2">
              <div class="stat-icon">✅</div>
              <div class="stat-value">{{ dashStats.faol_members }}</div>
              <div class="stat-label">Faol A'zolar</div>
              <div class="stat-sub">Holati: faol</div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg,#f59e0b 0%,#d97706 100%); color:#fff">
              <div class="stat-icon">⏳</div>
              <div class="stat-value">{{ dashStats.kutilmoqda_members }}</div>
              <div class="stat-label">Kutilmoqda</div>
              <div class="stat-sub">Tasdiqlanmagan</div>
            </div>
            <div class="stat-card c3">
              <div class="stat-icon">📅</div>
              <div class="stat-value">{{ dashStats.bugun_qoshilgan }}</div>
              <div class="stat-label">Bugun Qo'shilgan</div>
              <div class="stat-sub">Yangi a'zo sanasi</div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg,#10b981 0%,#059669 100%); color:#fff">
              <div class="stat-icon">🔄</div>
              <div class="stat-value">{{ dashStats.qayta_azolar }}</div>
              <div class="stat-label">Qayta A'zolar</div>
              <div class="stat-sub">Qayta a'zo bo'lganlar</div>
            </div>
          </div>

          <!-- KPI Stat Cards Row 2: Books & Issues -->
          <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 16px;">
            <div class="stat-card c3">
              <div class="stat-icon">📚</div>
              <div class="stat-value">{{ dashStats.unique_titles }}</div>
              <div class="stat-label">Noyob Sarlavha</div>
              <div class="stat-sub">Jami kitob turi</div>
            </div>
            <div class="stat-card c1">
              <div class="stat-icon">🗂️</div>
              <div class="stat-value">{{ dashStats.total_books }}</div>
              <div class="stat-label">Jami Nusxalar</div>
              <div class="stat-sub">Barcha inventar</div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg,#10b981 0%,#059669 100%); color:#fff">
              <div class="stat-icon">✅</div>
              <div class="stat-value">{{ dashStats.available_books }}</div>
              <div class="stat-label">Mavjud Kitoblar</div>
              <div class="stat-sub">Berilishga tayyor</div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg,#6366f1 0%,#4f46e5 100%); color:#fff">
              <div class="stat-icon">📖</div>
              <div class="stat-value">{{ dashStats.borrowed_books }}</div>
              <div class="stat-label">Berilgan Kitoblar</div>
              <div class="stat-sub">Hozir foydalanuvchida</div>
            </div>
            <div class="stat-card c4">
              <div class="stat-icon">⚠️</div>
              <div class="stat-value">{{ dashStats.overdue_issues }}</div>
              <div class="stat-label">Kechikkan Kitoblar</div>
              <div class="stat-sub">Muddati o'tgan</div>
            </div>
          </div>

          <!-- KPI Stat Cards Row 3: Finance -->
          <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px;">
            <div class="stat-card c2">
              <div class="stat-icon">💰</div>
              <div class="stat-value">{{ formatPrice(dashStats.today_income) }}</div>
              <div class="stat-label">Bugungi Daromad</div>
              <div class="stat-sub">Bugungi tushum</div>
            </div>
            <div class="stat-card c3">
              <div class="stat-icon">📈</div>
              <div class="stat-value">{{ formatPrice(dashStats.monthly_income) }}</div>
              <div class="stat-label">Oylik Daromad</div>
              <div class="stat-sub">Joriy oydagi tushum</div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg,#10b981 0%,#059669 100%); color:#fff">
              <div class="stat-icon">💵</div>
              <div class="stat-value">{{ formatPrice(dashStats.total_income) }}</div>
              <div class="stat-label">Jami Daromad</div>
              <div class="stat-sub">Barcha vaqt uchun</div>
            </div>
            <div class="stat-card c4">
              <div class="stat-icon">❗</div>
              <div class="stat-value">{{ dashStats.debtors_count }}</div>
              <div class="stat-label">Qarzdorlar</div>
              <div class="stat-sub">Kechikkan yoki muddati o'tgan</div>
            </div>
          </div>

          <!-- Charts Row -->
          <div class="grid-2" style="margin-bottom:20px">
            <div class="card">
              <div class="card-header">
                <div class="card-title">📈 Oylik A'zolar O'sishi</div>
              </div>
              <div class="chart-wrapper">
                <canvas id="monthlyChart"></canvas>
              </div>
            </div>
            <div class="card">
              <div class="card-header">
                <div class="card-title">⚥ Jins Bo'yicha</div>
              </div>
              <div class="chart-wrapper" style="height:180px">
                <canvas id="genderChart"></canvas>
              </div>
            </div>
          </div>

          <!-- Top Members Table -->
          <div class="card">
            <div class="card-header">
              <div class="card-title">🏆 Eng Ko'p Kitob Olganlar</div>
            </div>
            <div class="table-container">
              <table>
                <thead>
                  <tr>
                    <th>#</th><th>Sigla</th><th>Familiya</th><th>Kitoblar soni</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="(m, i) in dashStats.top_members" :key="m.sigla">
                    <td>{{ i+1 }}</td>
                    <td><span class="badge badge-purple">{{ m.sigla }}</span></td>
                    <td>{{ m.familiya }}</td>
                    <td><strong>{{ m.issue_count }}</strong> ta</td>
                  </tr>
                  <tr v-if="!dashStats.top_members.length">
                    <td colspan="4" class="table-empty">Ma'lumot yo'q</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </template>

        <div v-else class="empty-state">
          <div class="empty-icon">📊</div>
          <div class="empty-title">Ma'lumotlar yuklanmoqda...</div>
        </div>
      </section>

      <!-- ====================================================
           MEMBERS PAGE
           ==================================================== -->
      <!-- ======================================================
           PAGE: BOOKS
           ====================================================== -->
      <section v-if="currentPage==='books'">
        <div class="card" style="margin-bottom:20px;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
            <div class="filters-bar" style="margin:0; flex:1; border:none; padding:0; background:transparent;">
              <div class="filter-search" style="flex:1">
                <span class="search-icon">🔍</span>
                <input class="form-control" v-model="bookSearchFilter" placeholder="Kitob nomi yoki muallif bo'yicha qidirish...">
              </div>
              <select class="form-control" v-model="bookBranchFilter" style="min-width:180px; margin-left:10px;">
                <option value="">Barcha bo'limlar</option>
                <option v-for="br in branches" :key="br.id" :value="br.id">{{ br.name }}</option>
              </select>
            </div>
            <div style="display:flex; gap:10px; margin-left:10px;">
              <button class="btn btn-secondary btn-sm" @click="navigate('import')">
                📥 Excel Import
              </button>
              <button v-if="auth.role === 'admin'" class="btn btn-danger btn-sm" @click="bulkDeleteBooks">
                🛑 Barchasini tozalash
              </button>
            </div>
          </div>
          
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Nomi</th>
                  <th>Muallif</th>
                  <th>Nashr Yili</th>
                  <th>Saqlash joyi / Bo'lim</th>
                  <th>Nusxalar soni</th>
                  <th>Inventar raqamlari (Holati)</th>
                  <th>Amallar</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="(b, i) in booksList" :key="b.id">
                  <td>{{ (bookPage - 1) * bookPageSize + i + 1 }}</td>
                  <td style="font-weight: 600;">{{ b.title }}</td>
                  <td>{{ b.author || '-' }}</td>
                  <td>{{ b.published_year || '-' }}</td>
                  <td>
                    <span v-for="brName in Array.from(new Set(b.items.map(i => i.branch_name).filter(Boolean)))" class="badge badge-purple" style="margin-right: 4px;">{{ brName }}</span>
                  </td>
                  <td><span class="badge badge-blue">{{ b.items.length }} ta</span></td>
                  <td style="font-size: 0.75rem; color: var(--text-muted);">
                    <span v-for="item in b.items" :key="item.id" style="display:inline-block; margin-right:8px; margin-bottom:4px; padding: 2px 6px; background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: 4px;">
                      {{ item.barcode }}
                      <span :class="{'badge-green': item.status==='available', 'badge-yellow': item.status==='borrowed'}" style="margin-left:4px; padding:2px 4px; border-radius:4px; font-size:0.65rem;">
                        {{ item.status === 'available' ? 'Mavjud' : item.status === 'borrowed' ? 'Band' : item.status }}
                      </span>
                    </span>
                  </td>
                  <td>
                    <div style="display:flex;gap:6px">
                      <button v-if="auth.role === 'admin'" class="btn btn-secondary btn-sm" @click="openEditBook(b)">✏️</button>
                      <button v-if="auth.role === 'admin'" class="btn btn-danger btn-sm" @click="deleteBook(b.id)">🗑</button>
                    </div>
                  </td>
                </tr>
                <tr v-if="!booksList.length && !booksLoading">
                  <td colspan="8" class="table-empty">Hech qanday kitob topilmadi.</td>
                </tr>
              </tbody>
            </table>
          </div>
          
          <div class="pagination" style="padding:12px 20px" v-if="bookTotal > 0">
            <div>Jami <b>{{ bookTotal }}</b> ta kitob | Sahifa {{ bookPage }} / {{ totalBookPages || 1 }}</div>
            <div style="display:flex; gap:10px; align-items:center;">
              <select class="form-control" style="padding:4px 8px; font-size:13px;" v-model.number="bookPageSize">
                <option :value="10">10 ta qator</option>
                <option :value="20">20 ta qator</option>
                <option :value="50">50 ta qator</option>
                <option :value="100">100 ta qator</option>
              </select>
              <button class="btn btn-secondary btn-sm" :disabled="bookPage === 1" @click="loadBooks(bookPage - 1)">← Oldingi</button>
              <span style="font-size:13px; font-weight:600;">{{ bookPage }}</span>
              <button class="btn btn-secondary btn-sm" :disabled="bookPage >= totalBookPages" @click="loadBooks(bookPage + 1)">Keyingi →</button>
            </div>
          </div>

          
        </div>
      </section>

      <section v-if="currentPage==='pending_members'">
        <div class="card" style="margin-bottom:24px;">
          <div class="card-header">
            <div class="card-title">⏳ Tasdiqlanmagan A'zolik So'rovlari</div>
          </div>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>F.I.Sh.</th>
                  <th>Telefon</th>
                  <th>Yo'nalish</th>
                  <th>Tug'ilgan Sana</th>
                  <th>So'rov Sanasi</th>
                  <th>Amallar</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="m in pendingMembers" :key="m.id">
                  <td><strong>{{ m.familiya }}</strong></td>
                  <td>{{ m.telegram_id }}</td>
                  <td><span class="badge badge-purple">{{ m.yunalish }}</span></td>
                  <td>{{ m.tugilgan_sana || '---' }}</td>

            <label class="form-label">A'zo Qidirish *</label>

                   placeholder="Sigla yoki familiya...">
            <div v-if="memberSearchResults.length" style="
              position:absolute; top:100%; left:0; right:0; z-index:100;
              background:var(--bg-surface); border:1px solid var(--border);
              border-radius:var(--radius-sm); overflow:hidden; box-shadow:var(--shadow-lg);">
              <div v-for="m in memberSearchResults" :key="m.id"
                   @click="selectMemberForIssue(m)"
                   style="padding:10px 14px;cursor:pointer;transition:background 0.15s"
                   @mouseenter="$event.target.style.background='var(--bg-card)'"
                   @mouseleave="$event.target.style.background=''">
                <span class="badge badge-purple" style="margin-right:8px">{{ m.sigla }}</span>{{ m.familiya }}
              </div>
            </div>
          </div>

          <div class="form-group form-full" style="position:relative">
            <label class="form-label">Kitob Qidirish *</label>
            <input id="issue-book-search" class="form-control" v-model="bookSearchQ"
                    placeholder="Kitob nomi yoki inventar raqami..." autocomplete="off">
            <div v-if="bookSearchResults.length" style="
              position:absolute; top:100%; left:0; right:0; z-index:100; max-height:200px; overflow-y:auto;
              background:var(--bg-surface); border:1px solid var(--border);
              border-radius:var(--radius-sm); box-shadow:var(--shadow-lg);">
              <div v-for="b in bookSearchResults" :key="b.id"
                   @click="b.status === 'available' ? selectBookForIssue(b) : null"
                   style="padding:10px 14px;transition:background 0.15s"
                   :style="{ cursor: b.status === 'available' ? 'pointer' : 'not-allowed', opacity: b.status === 'available' ? '1' : '0.6' }"
                   @mouseenter="b.status === 'available' ? $event.target.style.background='var(--bg-card)' : ''"
                   @mouseleave="$event.target.style.background=''">
                <span class="badge" :class="{'badge-green': b.status==='available', 'badge-yellow': b.status==='borrowed', 'badge-red': b.status==='lost'}" style="margin-right:8px">
                  {{ b.status === 'available' ? 'Mavjud' : b.status === 'borrowed' ? 'Band qilingan' : b.status }}
                </span>
                <b>{{ b.title }}</b> <span style="color:var(--text-muted);font-size:0.8rem">({{ b.barcode }})</span>
              </div>
            </div>
            
            <div v-if="issueForm.book_item" style="margin-top:10px; padding:10px; background:var(--bg-card); border-radius:var(--radius-sm); border:1px solid var(--border-light);">
              <span style="color:var(--accent-green)">Tanlangan kitob:</span> 
              <b>{{ issueForm.book_name }}</b>
              <button class="btn btn-sm btn-secondary" style="margin-left:10px; padding:2px 6px;" @click="issueForm.book_item=null; issueForm.book_name=''">❌</button>
            </div>
          </div>

          <!-- Category removed -->

          <div class="form-group">
            <label class="form-label">Berilgan Sana</label>
            <input id="field-issue-date" class="form-control" type="date" v-model="issueForm.berilgan_sana">
          </div>

          <div class="form-group">
            <label class="form-label">Qaytarish Sanasi *</label>
            <input id="field-return-date" class="form-control" type="date" v-model="issueForm.qaytarish_sana">
          </div>

          <div class="form-group">
            <label class="form-label">Jarima (1 kun, so'm)</label>
            <input id="field-fine" class="form-control" type="number" v-model="issueForm.jarima_kun_narxi" min="0">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" @click="showIssueModal=false" id="btn-cancel-issue">Bekor</button>
        <button class="btn btn-success" @click="saveIssue" id="btn-save-issue">📖 Berish</button>
      </div>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div class="toast-container">
    <div v-for="t in toasts" :key="t.id" class="toast" :class="t.type">
      <span v-if="t.type==='success'">✅</span>
      <span v-else-if="t.type==='error'">❌</span>
      <span v-else-if="t.type==='warning'">⚠️</span>
      <span v-else>ℹ️</span>
      {{ t.msg }}
    </div>
  </div>

  <!-- Sidebar Overlay (mobile) -->
  <div v-if="sidebarOpen" style="
    position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;"
    @click="sidebarOpen=false">
  </div>

  </template>

</div><!-- /#app -->

<script src="/static/js/app.js?v=2"></script>
  <!-- AI Chatbot Widget -->
  <div id="ai-chatbot-container">
    <div id="ai-chat-button" onclick="toggleChat()">
      <span style="font-size: 24px; margin-bottom: 2px; line-height: 1;">🤖</span>
      <span style="font-size: 12px; font-weight: bold; line-height: 1;">AI</span>
    </div>
    <div id="ai-chat-window" style="display: none;">
      <div id="ai-chat-header">
        Kutubxona AI <span onclick="toggleChat()" style="cursor:pointer;">✖</span>
      </div>
      <div id="ai-chat-messages">
        <div class="chat-message bot">Salom! Men kutubxona AI yordamchisiman. Sizga qanday kitoblar kerak?</div>
      </div>
      <div id="ai-chat-input-area">
        <input type="text" id="ai-chat-input" placeholder="Xabar yozing..." onkeypress="if(event.key === 'Enter') sendChatMessage()">
        <button onclick="sendChatMessage()">Yuborish</button>
      </div>
    </div>
  </div>

  <style>
    #ai-chatbot-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      font-family: 'Inter', sans-serif;
    }
    #ai-chat-button {
      background: #4F46E5;
      color: white;
      border-radius: 50%;
      width: 65px;
      height: 65px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: transform 0.3s;
      user-select: none;
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }
    #ai-chat-button:hover {
      transform: scale(1.1);
    }
    #ai-chat-window {
      width: 320px;
      height: 450px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #e5e7eb;
      position: absolute;
      bottom: 75px;
      right: 0;
    }
    #ai-chat-header {
      background: #4F46E5;
      color: white;
      padding: 15px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #ai-chat-messages {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      background: #f9fafb;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chat-message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.4;
    }
    .chat-message.bot {
      background: #e0e7ff;
      color: #3730a3;
      align-self: flex-start;
      border-bottom-left-radius: 2px;
    }
    .chat-message.user {
      background: #4F46E5;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }
    #ai-chat-input-area {
      display: flex;
      padding: 10px;
      background: white;
      border-top: 1px solid #e5e7eb;
    }
    #ai-chat-input {
      flex: 1;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      outline: none;
    }
    #ai-chat-input:focus {
      border-color: #4F46E5;
    }
    #ai-chat-input-area button {
      background: #4F46E5;
      color: white;
      border: none;
      padding: 0 15px;
      margin-left: 8px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }
    #ai-chat-input-area button:hover {
      background: #4338ca;
    }
  </style>

  <script>
    function toggleChat() {
      const window = document.getElementById('ai-chat-window');
      window.style.display = window.style.display === 'none' ? 'flex' : 'none';
    }

    async function sendChatMessage() {
      const input = document.getElementById('ai-chat-input');
      const text = input.value.trim();
      if (!text) return;

      appendMessage('user', text);
      input.value = '';

      const typingId = 'typing-' + Date.now();
      appendMessage('bot', '...', typingId);

      try {
        const response = await fetch('/api/ai/chat/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ message: text })
        });
        
        const data = await response.json();
        
        const typingEl = document.getElementById(typingId);
        if(typingEl) typingEl.remove();
        
        appendMessage('bot', data.response);
      } catch (err) {
        const typingEl = document.getElementById(typingId);
        if(typingEl) typingEl.remove();
        appendMessage('bot', 'Xatolik yuz berdi. Iltimos qayta urinib ko\'ring.');
      }
    }

    function appendMessage(sender, text, id = null) {
      const messagesDiv = document.getElementById('ai-chat-messages');
      const msgDiv = document.createElement('div');
      msgDiv.className = 'chat-message ' + sender;
      if (id) msgDiv.id = id;
      msgDiv.innerHTML = text;
      messagesDiv.appendChild(msgDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
  </script>
</body>
</html>
